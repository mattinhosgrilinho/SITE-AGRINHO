<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroForte - Futuro Sustentável</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">Agro<span>Forte</span></div>
            <ul class="nav-links">
                <li><a href="#">Início</a></li>
                <li><a href="#">Sobre</a></li>
                <li><a href="#">Potencialidades</a></li>
                <li><a href="#">Contato</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>O Futuro é Sustentável</h1>
            <p>Equilíbrio entre produção e preservação para a agricultura familiar.</p>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Busque por técnicas, culturas ou regiões...">
                <button onclick="searchInfo()"><i class="fas fa-search"></i> Buscar</button>
            </div>
        </div>
    </section>

    <main class="container">
        <section id="results" class="info-grid">
            </section>
    </main>

    <footer>
        <p>&copy; 2026 AgroForte - Referências: EMBRAPA & Ministério do Desenvolvimento Agrário</p>
    </footer>

    <script src="script.js"></script>
